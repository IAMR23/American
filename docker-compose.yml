version: "3.9"

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx_proxy_manager
    restart: always
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - public
      - private

  mongo:
    image: mongo:6.0
    container_name: karaoke_mongo
    command: ["--auth", "--bind_ip_all"]
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: karaoke
    volumes:
      - mongo-data:/data/db
      - ./mongo-backups:/data/backup
    restart: always
    networks:
      - private
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: karaoke_backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/karaoke?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      PAYPAL_API: ${PAYPAL_API}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo
    networks:
      - private
      - public-internet
    dns:
      - 8.8.8.8
      - 1.1.1.1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_CLIENT_ID: ${VITE_CLIENT_ID}
    container_name: karaoke_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - private
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  npm-data:
  npm-letsencrypt:
  mongo-data:

networks:
  public:
  private:
    internal: true
  public-internet:
    driver: bridge